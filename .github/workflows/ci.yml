name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Compile
        run: npm run compile
      - name: Lint
        run: npm run check
      - name: Fallow audit
        run: npm run fallow:audit:ci
      - name: Upload Fallow SARIF
        if: always() && hashFiles('fallow-results.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: fallow-results.sarif
      - name: Test
        run: npm test
